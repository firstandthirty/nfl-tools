name: Beat the Streak Picks

on:
  workflow_dispatch:
  schedule:
    # 12:00 PM ET (16:00 UTC)
    - cron: "0 16 * * *"

    # 6:00 PM ET (22:00 UTC)
    - cron: "0 22 * * *"

jobs:
  run-bts:
    runs-on: ubuntu-latest

    steps:    pip install requests pandas numpy python-dateutil pytz MLB-StatsAPI beautifulsoup4
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests MLB-StatsAPI

      - name: Run Beat the Streak script
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python baseball/bts_picks.py
